crawlers:
  news:
    schedule_minutes: 15
    max_lookback_hours: 24        # cutoff 상한·fallback (직전 성공 크롤 이후, 없으면 now-24h)
    source_timeout_seconds: 10
    retry_count: 3
    retry_delay_seconds: 10
    dedup_window_hours: 24        # LLM 중복 검사 대상 시간 윈도우
  weather:
    schedule_minutes: 30
    source_timeout_seconds: 15
  stock:
    sync_interval_minutes: 60
    sigma_schedule: "0 3 * * 1"       # 월요일 03:00 (KST)
    analyze_schedule: "0 6 * * 2-6"   # 화-토 06:00 (KST, 미국장 종료)
  github_trending:
    schedule: "0 9 * * *"              # 매일 09:00 (KST)
    since: "daily"
    language: null
    max_repos: 25
  hacker_news:
    schedule: "0 */4 * * *"              # 4시간마다 (Asia/Seoul)
    max_items: 100
    min_score: 50
    story_types:
      - top
      - best
    source_timeout_seconds: 30
    retry_count: 3
    retry_delay_seconds: 10
    dedup_window_hours: 24
  arxiv:
    schedule: "0 10 * * *"               # 매일 10:00 (KST)
    categories:
      - cs.AI
      - cs.LG
      - cs.CL
      - stat.ML
    max_results_per_category: 25
    source_timeout_seconds: 30
    retry_count: 3
    retry_delay_seconds: 5
    dedup_window_hours: 48
  exchange_crypto:
    schedule: "0 */4 * * *"            # 4시간마다 (KST)
    vs_currency: "krw"
    max_coins: 100
    include_trending: true
  product_hunt:
    schedule: "0 11 * * *"               # 매일 11:00 (KST)
    developer_token: ""
    max_posts: 30
    source_timeout_seconds: 15
    retry_count: 3
    retry_delay_seconds: 10
  reddit:
    schedule: "0 */4 * * *"
    client_id: ""
    client_secret: ""
    user_agent: "scoophub/1.0 by whsanha55"
    subreddits:
      - programming
      - python
      - javascript
      - MachineLearning
      - webdev
      - datascience
    listing_type: "hot"
    max_posts_per_subreddit: 25
    min_score: 50
    source_timeout_seconds: 15
    retry_count: 3
    retry_delay_seconds: 10
  youtube_trending:
    schedule: "0 */6 * * *"
    api_key: ""
    region_codes:
      - KR
      - US
    max_results_per_region: 50
    source_timeout_seconds: 15
    retry_count: 3
    retry_delay_seconds: 10

api:
  default_minutes: 30
  max_limit: 100

retention:
  days: 30
