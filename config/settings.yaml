crawlers:
  news:
    schedule_minutes: 15
    max_lookback_hours: 24
    source_timeout_seconds: 10
    retry_count: 3
    retry_delay_seconds: 10
    dedup_window_hours: 24
  weather:
    schedule_minutes: 30
    source_timeout_seconds: 15
  stock:
    sync_interval_minutes: 60
    sigma_schedule: "0 3 * * 1"
    analyze_schedule: "0 6 * * 2-6"
  github_trending:
    schedule: "0 9 * * *"
    since: "daily"
    language: null
    max_repos: 25
  hacker_news:
    schedule: "0 */4 * * *"
    max_items: 100
    min_score: 50
    story_types:
      - top
      - best
    source_timeout_seconds: 30
    retry_count: 3
    retry_delay_seconds: 10
    dedup_window_hours: 24
  arxiv:
    schedule: "0 10 * * *"
    categories:
      - cs.AI
      - cs.LG
      - cs.CL
      - stat.ML
    max_results_per_category: 25
    source_timeout_seconds: 30
    retry_count: 3
    retry_delay_seconds: 5
    dedup_window_hours: 48
  exchange_crypto:
    schedule: "0 */4 * * *"
    vs_currency: "krw"
    max_coins: 100
    include_trending: true
  product_hunt:
    schedule: "0 11 * * *"
    developer_token: ""
    max_posts: 30
    source_timeout_seconds: 15
    retry_count: 3
    retry_delay_seconds: 10
  reddit:
    schedule: "0 */4 * * *"
    client_id: ""
    client_secret: ""
    user_agent: "scoophub/1.0 by whsanha55"
    subreddits:
      - programming
      - python
      - javascript
      - MachineLearning
      - webdev
      - datascience
    listing_type: "hot"
    max_posts_per_subreddit: 25
    min_score: 50
    source_timeout_seconds: 15
    retry_count: 3
    retry_delay_seconds: 10
  youtube_trending:
    schedule: "0 */6 * * *"
    api_key: ""
    region_codes:
      - KR
      - US
    max_results_per_region: 50
    source_timeout_seconds: 15
    retry_count: 3
    retry_delay_seconds: 10
  devto_hashnode:
    schedule: "0 */4 * * *"
    tags:
      - python
      - javascript
      - webdev
      - tutorial
      - beginners
    max_articles_per_tag: 30
    source_timeout_seconds: 10
    retry_count: 3
    retry_delay_seconds: 10

api:
  default_minutes: 30
  max_limit: 100

retention:
  days: 30
