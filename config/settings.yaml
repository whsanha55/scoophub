crawlers:
  news:
    schedule_minutes: 15
    max_lookback_hours: 24        # cutoff 상한·fallback (직전 성공 크롤 이후, 없으면 now-24h)
    source_timeout_seconds: 10
    retry_count: 3
    retry_delay_seconds: 10
    dedup_window_hours: 24        # 제목 유사도 비교 대상 시간 윈도우
    title_similarity: 0.85        # 제목 유사도 임계값 (>= 이면 중복)
  weather:
    schedule_minutes: 30
    source_timeout_seconds: 15
  stock:
    sync_interval_minutes: 60
    sigma_schedule: "0 3 * * 1"       # 월요일 03:00 (KST)
    analyze_schedule: "0 6 * * 2-6"   # 화-토 06:00 (KST, 미국장 종료)

api:
  default_minutes: 30
  max_limit: 100

retention:
  days: 30
